selection_method:
  target: City of Seattle August 4, 2026 primary ballots
  rule: >-
    Start with King County Elections' official primary candidate, PCO, and composite sample
    ballot files. Include statewide and countywide contests; exact candidate-file jurisdictions
    whose official current district maps intersect Seattle; City of Seattle contests and
    measures; and PCO contests whose official precinct name begins with "SEA ".
  exclusions:
    - Exclude districts that do not intersect Seattle.
    - Exclude County Council District 4 because the official primary files contain no contest for it.
    - Exclude the Northeast District Court contest because that electoral district does not intersect Seattle.
    - Do not derive the ballot universe from endorsement publications.
  source_ids:
    - king-county-candidates
    - king-county-pco-democrats
    - king-county-pco-republicans
    - king-county-sample-ballot
    - king-county-congressional-map
    - king-county-legislative-map
    - king-county-council-map
    - king-county-district-court-map
