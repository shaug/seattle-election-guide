name: Project task
description: A scoped implementation, research, editorial, or release task
title: ""
labels: []
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What concrete result should exist when this issue is complete?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included and explicitly excluded?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Provide verifiable completion criteria.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and references
      description: Link official sources, relevant decisions, or predecessor issues.
