name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Install locked dependencies
        run: uv sync --frozen
      - name: Install rendering system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes poppler-utils
          google-chrome --version
          pdftoppm -v
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run pyright
      - name: Test
        run: uv run pytest
      - name: Validate canonical election inventory
        run: uv run election-guide inventory validate data/normalized/wa-2026-primary-inventory.json
      - name: Verify reproducible primary release inputs
        run: uv run election-guide release verify data/releases/wa-2026-primary/source-decisions.yaml
      - name: Build and verify deterministic primary release
        run: |
          uv run election-guide release build data/releases/wa-2026-primary/source-decisions.yaml \
              --release-version 2026-primary.2 \
              --generated-at 2026-07-23T17:15:00Z \
            --output-dir dist/ci-release-a
          uv run election-guide release build data/releases/wa-2026-primary/source-decisions.yaml \
              --release-version 2026-primary.2 \
              --generated-at 2026-07-23T17:15:00Z \
            --output-dir dist/ci-release-b
          cmp \
            dist/ci-release-a/seattle-election-guide-2026-primary.2.zip \
            dist/ci-release-b/seattle-election-guide-2026-primary.2.zip
          unzip -t dist/ci-release-a/seattle-election-guide-2026-primary.2.zip
          unzip -Z1 dist/ci-release-a/seattle-election-guide-2026-primary.2.zip \
            | grep -Fx 'seattle-election-guide/validation/rendering/rendering_validation_report.json'
          unzip -Z1 dist/ci-release-a/seattle-election-guide-2026-primary.2.zip \
            | grep -Fx 'seattle-election-guide/validation/rendering/pdf/pages/page-1.png'
          test "$(stat -c '%a' dist/ci-release-a)" = 755
      - name: Stage verified Cloudflare Pages site
        run: |
          uv run election-guide hosting stage dist/ci-release-a/bundle \
            --expected-git-commit "$GITHUB_SHA" \
            --output-dir dist/cloudflare-site
          test -f dist/cloudflare-site/index.html
          test -f dist/cloudflare-site/Seattle_2026_Primary_Endorsement_Guide.pdf
      - name: Upload Cloudflare Pages site
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-site
          path: dist/cloudflare-site
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      vars.CLOUDFLARE_PAGES_ENABLED == 'true'
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://seattle-elections.dobravoda.dev
    concurrency:
      group: cloudflare-pages-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install pinned Wrangler
        run: npm ci --ignore-scripts
      - name: Verify Wrangler version
        run: npm run pages:version
      - name: Download verified Pages site
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-site
          path: dist/cloudflare-site
      - name: Deploy production site
        run: >-
          npm run pages:deploy --
          --commit-hash="$GITHUB_SHA"
          --commit-dirty=false
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
