name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Install locked dependencies
        run: uv sync --frozen
      - name: Install rendering system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes poppler-utils
          google-chrome --version
          pdftoppm -v
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run pyright
      - name: Test
        run: uv run pytest
      - name: Validate canonical election inventory
        run: uv run election-guide inventory validate data/normalized/wa-2026-primary-inventory.json
      - name: Verify reproducible primary release inputs
        run: uv run election-guide release verify data/releases/wa-2026-primary/source-decisions.yaml
      - name: Build and verify deterministic primary release
        run: |
          uv run election-guide release build data/releases/wa-2026-primary/source-decisions.yaml \
            --release-version ci \
            --generated-at 2026-07-21T16:00:00Z \
            --output-dir dist/ci-release-a
          uv run election-guide release build data/releases/wa-2026-primary/source-decisions.yaml \
            --release-version ci \
            --generated-at 2026-07-21T16:00:00Z \
            --output-dir dist/ci-release-b
          cmp \
            dist/ci-release-a/seattle-election-guide-ci.zip \
            dist/ci-release-b/seattle-election-guide-ci.zip
          unzip -t dist/ci-release-a/seattle-election-guide-ci.zip
          unzip -Z1 dist/ci-release-a/seattle-election-guide-ci.zip \
            | grep -Fx 'seattle-election-guide/validation/rendering/rendering_validation_report.json'
          unzip -Z1 dist/ci-release-a/seattle-election-guide-ci.zip \
            | grep -Fx 'seattle-election-guide/validation/rendering/pdf/pages/page-1.png'
          test "$(stat -c '%a' dist/ci-release-a)" = 755
